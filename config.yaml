discord:
  webhook_url: "${DISCORD_WEBHOOK_URL}"

sites:
  - name: "GeekNews (Hada)"
    key: "hada"
    type: "rss"
    url: "https://news.hada.io/rss/news"
    enabled: true
    max_articles: 30

  - name: "AI Times"
    key: "aitimes"
    type: "rss"
    url: "https://www.aitimes.com/rss/allArticle.xml"
    enabled: true
    max_articles: 30

  - name: "Yozm Wishket AI"
    key: "yozm"
    type: "rss"
    url: "https://yozm.wishket.com/magazine/ai/feed/"
    enabled: true
    max_articles: 30

  - name: "Anthropic News"
    key: "anthropic_news"
    type: "rss"
    url: "https://rsshub.rssforever.com/anthropic/news"
    enabled: true
    max_articles: 30

  - name: "Anthropic Engineering"
    key: "anthropic_engineering"
    type: "rss"
    url: "https://rsshub.rssforever.com/anthropic/engineering"
    enabled: true
    max_articles: 30

  - name: "Anthropic Research"
    key: "anthropic_research"
    type: "rss"
    url: "https://rsshub.rssforever.com/anthropic/research"
    enabled: true
    max_articles: 30

schedules:
  - name: "every-30min"
    cron: "*/30 * * * *"
    timezone: "Asia/Seoul"
    sites: ["all"]

storage:
  db_path: "news_bot.db"
  retention_days: 90

logging:
  level: "INFO"
  file: "news_bot.log"
