discord:
  webhook_url: "${DISCORD_WEBHOOK_URL}"

sites:
  - name: "GeekNews (Hada)"
    key: "hada"
    type: "rss"
    url: "https://news.hada.io/rss/news"
    enabled: true
    max_articles: 10

  - name: "AI Times"
    key: "aitimes"
    type: "rss"
    url: "https://www.aitimes.com/rss/allArticle.xml"
    enabled: true
    max_articles: 10

  - name: "Yozm Wishket AI"
    key: "yozm"
    type: "rss"
    url: "https://yozm.wishket.com/magazine/ai/feed/"
    enabled: true
    max_articles: 10

schedules:
  - name: "every-5min"
    cron: "*/5 * * * *"
    timezone: "Asia/Seoul"
    sites: ["all"]

storage:
  db_path: "news_bot.db"
  retention_days: 90

logging:
  level: "INFO"
  file: "news_bot.log"
