name: Send News to Discord

on:
  schedule:
    # 월~금 06:00~08:30 KST (= UTC 21:00~23:30 전날, Sun-Thu)
    - cron: "5,35 21-23 * * 0-4"
    # 월~금 09:00~18:00 KST (= UTC 00:00~09:00, Mon-Fri)
    - cron: "5,35 0-9 * * 1-5"
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ".[local]"

      - name: Restore DB cache
        uses: actions/cache/restore@v4
        with:
          path: news_bot.db
          key: news-db-${{ github.run_id }}
          restore-keys: |
            news-db-

      - name: Send news
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python cli.py send-now

      - name: Save DB cache
        uses: actions/cache/save@v4
        with:
          path: news_bot.db
          key: news-db-${{ github.run_id }}
